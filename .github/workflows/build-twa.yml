name: Build TWA APK

on:
  workflow_dispatch:
    inputs:
      build_id:
        required: true
      project_id:
        required: true
      app_name:
        required: true
      website_url:
        required: true
      primary_color:
        required: true
        default: '#000000'
      splash_color:
        required: true
        default: '#FFFFFF'
      callback_url:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm i -g @bubblewrap/cli

      - name: Prepare Project
        run: |
          mkdir twa
          cd twa

          echo "=== NORMALIZE DOMAIN ==="
          RAW="${{ github.event.inputs.website_url }}"
          RAW=$(echo "$RAW" | xargs)
          RAW=${RAW#http://}
          RAW=${RAW#https://}
          RAW=${RAW%%/*}
          RAW=${RAW%%:*}
          HOST=$(echo "$RAW" | tr -cd '[:alnum:].-')
          echo "HOST=$HOST"

          echo "=== PACKAGE ==="
          RAW_ID="${{ github.event.inputs.project_id }}"
          SAFE_ID=$(echo "$RAW_ID" | tr '-' '_' | tr -cd '[:alnum:].')
          PKG="app.nativify.$SAFE_ID"

          cat > twa-manifest.json <<EOF
          {
            "packageId": "$PKG",
            "startUrl": "https://$HOST",
            "scope": "https://$HOST/",
            "name": "${{ github.event.inputs.app_name }}",
            "launcherName": "${{ github.event.inputs.app_name }}",
            "display": "standalone",
            "displayOverride": ["standalone"],
            "themeColor": "${{ github.event.inputs.primary_color }}",
            "navigationColor": "${{ github.event.inputs.primary_color }}",
            "backgroundColor": "${{ github.event.inputs.splash_color }}",
            "enableNotifications": false,
            "iconUrl": "https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg",
            "maskableIconUrl": "https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg",
            "orientation": "default",
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "shortcuts": [],
            "fingerprints": [],
            "signingKey": {
              "path": "./key.jks",
              "alias": "alias"
            }
          }
          EOF

          echo "=== MANIFEST ==="
          cat twa-manifest.json

          keytool -genkey -v \
            -keystore key.jks \
            -alias alias \
            -storepass pass123 \
            -keypass pass123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Build,O=Build,C=US"

      - name: Build APK
        working-directory: twa
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

          bubblewrap init --manifest twa-manifest.json --skipPwaValidation --yes
          bubblewrap build --skipPwaValidation --yes
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: pass123
          BUBBLEWRAP_KEY_PASSWORD: pass123

      - name: Find APK
        id: find
        working-directory: twa
        run: |
          APK=$(find . -name "*.apk" | head -1)
          if [ -f "$APK" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "path=$APK" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Callback Success
        if: steps.find.outputs.found == 'true'
        run: |
          APK_BASE64=$(base64 -w 0 "twa/${{ steps.find.outputs.path }}")
          curl -X POST "${{ github.event.inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "x-build-secret: ${{ secrets.BUILD_CALLBACK_SECRET }}" \
            -d "{
              \"build_id\":\"${{ github.event.inputs.build_id }}\",
              \"project_id\":\"${{ github.event.inputs.project_id }}\",
              \"status\":\"success\",
              \"apk_base64\":\"$APK_BASE64\"
            }"

      - name: Callback Fail
        if: steps.find.outputs.found != 'true'
        run: |
          curl -X POST "${{ github.event.inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "x-build-secret: ${{ secrets.BUILD_CALLBACK_SECRET }}" \
            -d "{
              \"build_id\":\"${{ github.event.inputs.build_id }}\",
              \"project_id\":\"${{ github.event.inputs.project_id }}\",
              \"status\":\"failed\"
            }"
